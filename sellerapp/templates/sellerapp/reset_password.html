{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Admin / User</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'sellerapp/css/login.css' %}">
</head>
<body>
    <!-- LOGIN CARD – Admin / User login, two selection boxes instead of dropdown -->
    <div class="login-card">
        <div class="form-header">
            <i class="fas fa-sign-in-alt"></i>
            <h2>Login</h2>
        </div>

        <form  method="post" action="{% url 'reset_password' %}">
            {% csrf_token %}
            <input type="hidden" placeholder="john.doe@example.com" required name="email" value="{{email}}">
    
            <div class="input-field">
                <label><i class="fas fa-envelope"></i>OTP</label>
                <input type="text" placeholder="john.doe@example.com" required name="otp">
            </div>

            <!-- Password Field -->
            <div class="input-field">
                <label><i class="fas fa-lock"></i>New Password</label>
                <input type="password" placeholder="Enter password" required name="newpassword">
            </div>

            <div class="input-field">
                <label><i class="fas fa-lock"></i>Confirm Password</label>
                <input type="password" placeholder="Enter password" required name="conpassword">
            </div>


            <input type="submit" class="login-btn" value="Change Password">

        </form>
    </div>
</body>
</html>
