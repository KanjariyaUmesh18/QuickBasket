{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Admin / User</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'sellerapp/css/login.css' %}">
</head>
<body>
    <!-- LOGIN CARD – Admin / User login, two selection boxes instead of dropdown -->
    <div class="login-card">
        <div class="form-header">
            <i class="fas fa-sign-in-alt"></i>
            <h2>Login</h2>
        </div>

        <form  method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <!-- TWO SELECTION BOXES: ADMIN / USER (replaces dropdown) -->
           

            <!-- Email Field -->
            <div class="input-field">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" placeholder="john.doe@example.com" required name="email">
            </div>

            <!-- Password Field -->
            <div class="input-field">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" placeholder="Enter password" required name="password">
            </div>


            <input type="submit" class="login-btn" value="login">

            <!-- Register Hint – now points to registration (Admin/User) -->
            <div class="register-hint">
                Don't have an account? <a href="{% url 'register' %}">Register</a>
                <span style="display: block; font-size:0.7rem; margin-top:5px; color: #a0aec0;">
                    <i class="fas fa-user-tag"></i> <a href="{% url 'forgot_password' %}">Forgot Password ?</a>
                </span>
            </div>
        </form>
    </div>

    <!-- (no script needed, inline onsubmit handles validation) -->
</body>
</html>
